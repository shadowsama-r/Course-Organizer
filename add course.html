        <div style="padding-left: 3%;">
        <h1 class="big-text">Add a Course</h1>
        <div class="small-line" style="margin-bottom: 3%;"></div>
        <label>Define the parameters for a new academic node. These entries will beindexed into your primary study terminal.</label>
        </div>
        <div class="form-container">
            <div>
                <h3>COURSE TITLE </h3>
                <input class="course-input" type="text" placeholder="e.g., Advanced Distributed Systems">

            </div>
            <div class="row">
                <div>
                <h3>COURSE CODE </h3>
                <input class="course-input" type="text" placeholder="CS-402" >
                </div>
                <div>
                <h3>COURSE INSTRUCTOR</h3>
                <input class="course-input" type="text" placeholder="Dr.Amr Ghonim">
                </div>
            </div>
            <div>
                <h3>COURSE DATE</h3>
                <input class="course-input" type="text" placeholder="Mon, 14:00 - 15:30">
            </div>
            <div class="btn-container">
                <button class="add-course-btn" >Add Course</button>
                <button class="discard-btn">Discard Draft</button>
            </div>
        </div>


        <footer style="z-index: 10; position: relative; margin-top: 18%;">
